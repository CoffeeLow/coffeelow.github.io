function cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277,
        h3 = 1013904242, h4 = 2773480762;
    for (let i = 0, k; i < str.length; i++) {
        k = Math.round(str[i] * 128 + 128);
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
        h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
        h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4), h2 ^= h1, h3 ^= h1, h4 ^= h1;
    return [h1>>>0, h2>>>0, h3>>>0, h4>>>0];
}

// Four 32-bit component hashes provide the seed for sfc32.

function sfc32(a, b, c, d) {
  return function() {
    a |= 0; b |= 0; c |= 0; d |= 0;
    let t = (a + b | 0) + d | 0;
    d = d + 1 | 0;
    a = b ^ b >>> 9;
    b = c + (c << 3) | 0;
    c = (c << 21 | c >>> 11);
    c = c + t | 0;
    return (t >>> 0) / 4294967296;
  }
}

	constructor(stepSize,instrument) {
		this.stepSize = stepSize;

		this.makeMelody()

	makeMelody() {
		this.pauseProb = Math.random()
		this.randomProb = Math.random()
		this.repeatProb = Math.random()
		this.toneUpProb = Math.random()
		this.toneDownProb = Math.random()
		this.min = rand(scale.length);
		this.max = rand(scale.length);	
		if(this.min > this.max) {
			let swp = this.min 
			this.min = this.max
			this.max = swp
		}
		this.vs = []
		for(let i = 0;i < 8;++i) this.vs.push(1)
		this.makeMelodyI += 1
	}

	play(buffer,offset) {
		let i = this.i % this.vs.length;

		if(this.i % (this.vs.length * 4) == 0) this.makeMelody()
			
		let duration = Math.random() / 4
		
		let prob =  (this.pauseProb + this.randomProb + this.repeatProb + this.toneUpProb + this.toneDownProb) * Math.random()

		if(prob > 0 && prob < this.pauseProb) {
		}
		prob -= this.pauseProb

		if(prob > 0 && prob < this.randomProb) {
				this.note = this.min + rand(this.max -  this.min);
				this.instrument.render(buffer,offset,scale[this.note],duration,this.vs[i]);
		}
		prob -= this.randomProb

		if(prob > 0 && prob < this.repeatProb) {
				this.instrument.render(buffer,offset,scale[this.note],duration,this.vs[i]);
		}
		prob -= this.repeatProb

		if(prob > 0 && prob < this.toneUpProb) {
				this.note += 1
				if(this.note > this.max) this.note = this.min + rand(this.max -  this.min);
				this.instrument.render(buffer,offset,scale[this.note],duration,this.vs[i]);
		}
		prob -= this.toneUpProb

		if(prob > 0 && prob < this.toneDownProb) {
				this.note -= 1
				if(this.note < this.min) this.note = this.min + rand(this.max -  this.min);
				this.instrument.render(buffer,offset,scale[this.note],duration,this.vs[i]);
		}
		prob -= this.toneDownProb
			
		this.i += 1;
	}
}

async function sound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()

instrumentGPU = gpu.createKernel(function(sampleRate, tone, rands, duration) {
    let freq = 440.0 * Math.pow(2.0, tone / 12.0);
    let t = this.thread.x / sampleRate;

    // 1. DER ANKER (Grundton)
    let originalSin = Math.sin(2.0 * Math.PI * freq * t);
    
    // 2. WÄRMERES MORPHING (Sigmoid)
    let m = t / (duration * 0.5); 
    if (m > 1.0) m = 1.0;
    let warmMorph = m * m * (3.0 - 2.0 * m); 

    // 3. REKURSIVER PFAD (Die Textur)
    let y = 2.0 * Math.PI * freq * t;
    let j = 0;
    
    // Wie viele Layer hat der Sound? (1-3)
    let n = Math.floor(3.0 * rands[j++]) + 1; 

    for (let i = 0; i < n; ++i) {
        let k = rands[j++];
        
        if (k < 0.12) {
            y = Math.sin(y);
        } else if (k < 0.24) {
            y = Math.sin(y) >= 0 ? 1.0 : -1.0; // Square
        } else if (k < 0.36) {
            y = 2.0 * (y / (2.0 * Math.PI) - Math.floor(0.5 + y / (2.0 * Math.PI))); // Saw
        } else if (k < 0.48) {
// 1. Randomisierte LFO-Parameter aus dem rands-Array
			const lfoSpeed = rands[j++] * 5.0 + 0.2; // Tempo: 0.2Hz bis 5.2Hz
			const lfoCenter = rands[j++] * 5.0 + 1.0; // Mittelpunkt des Exponenten
			const lfoDepth = rands[j++] * 5.0;        // Wie weit schwingt er aus?

			// 2. Der LFO (Sinus-basiert)
			const lfo = Math.sin(lfoSpeed * t * 6.283);
			
			// 3. Dynamischer Exponent (Center +/- Depth, mind. 0.1)
			const dynExp = Math.abs(lfoCenter + lfo * lfoDepth) + 0.1;

			// 4. Symmetrische Power-Welle
			const s = Math.sin(y);
			y = (s >= 0 ? 1.0 : -1.0) * Math.pow(Math.abs(s), dynExp);
        } else if (k < 0.60) {
            y = Math.abs(4.0 * (y / (2.0 * Math.PI) - Math.floor(y / (2.0 * Math.PI) + 0.5))) - 1.0; // Triangle
        } else if (k < 0.72) {
            let p = (y / (2.0 * Math.PI)) - Math.floor(y / (2.0 * Math.PI));
            y = 8.0 * p * (1.0 - p) - 1.0; // Parabolic
        } else if (k < 0.84) {
            let steps = Math.floor(rands[j++] * 12.0) + 4.0;
            y = Math.floor(Math.sin(y) * steps) / steps; // Quantized
        } else {
            y = Math.atan(Math.tan(y * 0.2)); // Tangent Chirp
        }
        
        // Signal für die nächste Iteration vorbereiten (Amplitude/Phase Scale)
        y *= 1.5 * Math.PI; 
    }
    y /= 2.0 * Math.PI;

    // --- MIX & GLUE ---
    let textureGain = warmMorph * 0.4; // Etwas mehr Präsenz für die Textur
    let mixedSignal = (originalSin * 0.7) + (y * textureGain);
    
    // Saturation-Glue (Soft Clipping)
    mixedSignal = Math.atan(mixedSignal * 1.8);

    // --- DYNAMISCHER ATTACK ---
    let amplitude = 1.0;
    let attackType = rands[j++]; 
    if (attackType < 0.5) {
        let attackTime = rands[j++] * 0.2 + 0.02; 
        if (t < attackTime) amplitude = t / attackTime;
    } else {
        if (t < 0.002) amplitude = t / 0.002;
    }

    // --- RELEASE ---
    if (rands[j++] < 0.5) {
        // Logarithmischer/Sigmoid Release
        amplitude *= (Math.atan(-100.0 * (t - (duration - 0.05))) + (Math.PI / 2.0)) / Math.PI;
    } else {
        // Exponential Decay
        amplitude *= Math.exp(-t / (duration * 0.4));
    }

    // --- FINAL MIX ---
    // Der Grundton (Sinus) bleibt im Ausklang stabiler als die Textur
    let finalSignal = (originalSin * 0.6) + (y * textureGain * amplitude);

    return finalSignal * amplitude;
}).setOutput([audioCtx.sampleRate]);

	let normalize = function(xs) {
		
		var min = 1000000;
		var max = -1000000;
		for(let i = 0;i < xs.length;++i) if(xs[i] > max) max = xs[i]; else if(xs[i] < min) min = xs[i];
		var a = Math.max(Math.abs(max),Math.abs(min));
		//for(let i = 0;i < xs.length;++i) xs[i] = 2 * (xs[i] - min) / (max - min) - 1;
		for(let i = 0;i < xs.length;++i) xs[i] /= a
		
		
		return xs;
	};
