function cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277,
        h3 = 1013904242, h4 = 2773480762;
    for (let i = 0, k; i < str.length; i++) {
        k = str.charCodeAt(i)
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
        h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
        h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4), h2 ^= h1, h3 ^= h1, h4 ^= h1;
    return [h1>>>0, h2>>>0, h3>>>0, h4>>>0];
}

var seed = Math.floor(Math.random * 65000);

function sfc32(a, b, c, d) {
  return function() {
    a |= 0; b |= 0; c |= 0; d |= 0;
    let t = (a + b | 0) + d | 0;
    d = d + 1 | 0;
    a = b ^ b >>> 9;
    b = c + (c << 3) | 0;
    c = (c << 21 | c >>> 11);
    c = c + t | 0;
    return (t >>> 0) / 4294967296;
  }
}



    
  function choose(xs) {
    return xs[Math.floor(xs.length * Math.random())]
  }
  
  let verbs = [
  "read","write","drive",
  "paint","have","make","know","get","think",
    "see","watch","make","give","use"
  ]
  
  let nouns = [
  "car","baer","house",
  "tree","bird","animal",
  "nose","street","area","book","business",
  "case","child","company","country","day","eye",
  "fact","family","government","group","hand","home","job"
  ]
  
  let adjectives = [
  "flat","black","white",
  "steep","big","small","able","bad","best","better","big","black",
  "certain","clear","different","early","easy","economic","federal",
  "free","full","good","great","hard"
  ]
  
  
  function subject(plural) {
    if(plural){
     return  choose(adjectives)
        + " "
        + choose(nouns) + "s"
    }  else{
         return choose(adjectives)
        + " "
        + choose(nouns)
    }
  }
  
  function predicate(plural) {
    if(!plural){
     return choose(adjectives)
        + "ly "
        + choose(verbs) + "s"
    } else{
         return   choose(adjectives)
        + "ly "
        + choose(verbs)
    }
  }

    function prefix(plural) {
      let x = choose(["","only"]) + " "

      
      if(plural)
        x += choose(["several","many","few","a few"])
      else
        x += choose(["a","the"]) + " " + choose(["single",""])

      return x
    }
    
  function sentence() {
    let plural0 = Math.random() < 0.5
    let plural1 = Math.random() < 0.5
      
    
    return prefix(plural0) + " " + subject(plural0)
      + " " + predicate(plural0)
      + " " + prefix(plural1) + " " + subject(plural1)
  }
